global:
  max_token_ceiling: 0
  prose_tax_warning_threshold: 0.0

rules:
  - name: deny_openai_style_api_keys
    scope: raw
    action: deny
    pattern: "sk-[A-Za-z0-9]{20,}"

  - name: deny_generic_api_key_assignment
    scope: raw
    action: deny
    pattern: "(?i)api[_-]?key\\s*[:=]\\s*\\S+"

  - name: deny_private_key_material
    scope: raw
    action: deny
    pattern: "BEGIN (RSA |OPENSSH )?PRIVATE KEY"
